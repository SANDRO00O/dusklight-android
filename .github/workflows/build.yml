name: Build Android

on:
  push:
    paths-ignore:
      - '*.md'
      - '*LICENSE'
  pull_request:

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

jobs:
  build-android:
    name: Build Android (${{matrix.name}})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Clang arm64-v8a
            preset: x-android-ci-arm64
            abi: arm64-v8a
            artifact_arch: arm64
            rust_target: aarch64-linux-android
          - name: Clang armeabi-v7a
            preset: x-android-ci-armv7
            abi: armeabi-v7a
            artifact_arch: armv7
            rust_target: armv7-linux-androideabi

    env:
      ANDROID_NDK_VERSION: "29.0.14206865"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install ninja-build

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0" "ndk;${ANDROID_NDK_VERSION}"

      - name: Install Rust Android target
        run: |
          rustup toolchain install stable
          rustup target add ${{matrix.rust_target}}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure CMake
        working-directory: ../..
        run: cmake --preset ${{matrix.preset}}

      - name: Build native library
        working-directory: ../..
        run: cmake --build --preset ${{matrix.preset}} --target dusklight

      - name: Stage stripped JNI library
        working-directory: ../..
        run: ANDROID_STAGE_ABIS="${{matrix.abi}}" platforms/android/scripts/stage-jni-libs.sh

      - name: Build APK
        run: ./gradlew :app:assembleRelease --rerun-tasks

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dusklight-android-${{matrix.artifact_arch}}
          path: app/build/outputs/apk/release/app-${{matrix.abi}}-release-unsigned.apk
