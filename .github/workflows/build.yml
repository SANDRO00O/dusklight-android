name: Build Android

on:
  push:
    paths-ignore:
      - '*.md'
      - '*LICENSE'
  pull_request:

env:
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: "sccache"
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

jobs:
  build-android:
    name: Build Android (${{matrix.name}})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Clang arm64-v8a
            preset: x-android-ci-arm64
            abi: arm64-v8a
            artifact_arch: arm64
            rust_target: aarch64-linux-android
          - name: Clang armeabi-v7a
            preset: x-android-ci-armv7
            abi: armeabi-v7a
            artifact_arch: armv7
            rust_target: armv7-linux-androideabi

    env:
      ANDROID_NDK_VERSION: "29.0.14206865"

    steps:
      # 1. Checkout full Dusklight source (CMakePresets.json + C++ source)
      - name: Checkout Dusklight source
        uses: actions/checkout@v6
        with:
          repository: TwilitRealm/dusklight
          fetch-depth: 0
          submodules: recursive
          path: source

      # 2. Override platforms/android/ with our version (build.gradle, stage-jni-libs.sh)
      - name: Checkout Android platform (this repo)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: source/platforms/android

      # 3. Patch CMakePresets.json — add armeabi-v7a presets missing from the main repo
      - name: Patch CMakePresets with armeabi-v7a support
        working-directory: source
        run: |
          python3 - << 'PYEOF'
          import json

          with open('CMakePresets.json') as f:
              data = json.load(f)

          cfg_names = [p['name'] for p in data['configurePresets']]
          bld_names = [p['name'] for p in data['buildPresets']]
          patched   = False

          if 'android-armeabi-v7a' not in cfg_names:
              idx = next(i for i, p in enumerate(data['configurePresets'])
                         if p['name'] == 'android-x86_64')
              data['configurePresets'].insert(idx + 1, {
                  "name":        "android-armeabi-v7a",
                  "displayName": "Android (armeabi-v7a)",
                  "inherits":    ["android-base"],
                  "cacheVariables": {"ANDROID_ABI": "armeabi-v7a"}
              })
              patched = True

          if 'x-android-ci-armv7' not in cfg_names:
              idx = next(i for i, p in enumerate(data['configurePresets'])
                         if p['name'] == 'x-android-ci-arm64')
              data['configurePresets'].insert(idx + 1, {
                  "name":      "x-android-ci-armv7",
                  "binaryDir": "${sourceDir}/build/android-armv7",
                  "inherits":  ["x-android-ci"],
                  "cacheVariables": {
                      "ANDROID_ABI":       "armeabi-v7a",
                      "Rust_CARGO_TARGET": "armv7-linux-androideabi"
                  }
              })
              patched = True

          if 'android-armeabi-v7a' not in bld_names:
              idx = next(i for i, p in enumerate(data['buildPresets'])
                         if p['name'] == 'android-x86_64')
              data['buildPresets'].insert(idx + 1, {
                  "name":            "android-armeabi-v7a",
                  "configurePreset": "android-armeabi-v7a",
                  "targets":         ["dusklight"]
              })
              patched = True

          if 'x-android-ci-armv7' not in bld_names:
              idx = next(i for i, p in enumerate(data['buildPresets'])
                         if p['name'] == 'x-android-ci-arm64')
              data['buildPresets'].insert(idx + 1, {
                  "name":            "x-android-ci-armv7",
                  "configurePreset": "x-android-ci-armv7",
                  "targets":         ["dusklight"]
              })
              patched = True

          if patched:
              with open('CMakePresets.json', 'w') as f:
                  json.dump(data, f, indent=2)
                  f.write('\n')
              print("Patched CMakePresets.json with armeabi-v7a presets")
          else:
              print("CMakePresets.json already up-to-date")
          PYEOF

      # 4. Fix aurora dds_io.cpp: uint64_t -> size_t narrowing (32-bit only).
      #    On armeabi-v7a size_t=32-bit, uint64_t=64-bit → C++11 list-init rejects it.
      - name: Patch aurora dds_io.cpp narrowing conversion (armeabi-v7a)
        if: matrix.abi == 'armeabi-v7a'
        working-directory: source
        run: |
          sed -i \
            's/ByteBuffer data{expectedSize};/ByteBuffer data{static_cast<size_t>(expectedSize)};/' \
            extern/aurora/lib/gfx/dds_io.cpp
          echo "dds_io.cpp patch:"
          grep -n "ByteBuffer data{" extern/aurora/lib/gfx/dds_io.cpp

      # 5. Fix endian.h: BSWAP64 is only defined for aarch64 in the dolphin headers.
      #    On armeabi-v7a it is undeclared. Add a fallback using __builtin_bswap64
      #    which is available on all Clang/GCC targets including 32-bit ARM.
      - name: Patch endian.h missing BSWAP64 (armeabi-v7a)
        if: matrix.abi == 'armeabi-v7a'
        working-directory: source
        run: |
          FILE="include/dusk/endian.h"
          # Only patch if BSWAP64 fallback isn't already present
          if ! grep -q '__builtin_bswap64' "$FILE"; then
            python3 - << 'PYEOF'
          import re

          path = "include/dusk/endian.h"
          with open(path) as f:
              content = f.read()

          guard = (
              "\n"
              "// armeabi-v7a fallback: BSWAP64 is not defined by dolphin headers on 32-bit ARM\n"
              "#ifndef BSWAP64\n"
              "#define BSWAP64(x) __builtin_bswap64(x)\n"
              "#endif\n"
          )

          # Insert before the first use of BSWAP64
          content = re.sub(
              r'(inline u64 be64\(u64 val\))',
              guard + r'\1',
              content,
              count=1
          )

          with open(path, 'w') as f:
              f.write(content)

          print("endian.h patched — BSWAP64 fallback added")
          PYEOF
          else
            echo "endian.h already has BSWAP64 fallback, skipping"
          fi
          grep -n -A1 'BSWAP64' include/dusk/endian.h | head -20

      # 6. Fix execute permission on stage-jni-libs.sh.
      #    actions/checkout does not preserve git file permissions,
      #    so the script arrives without +x and fails with exit code 126.
      - name: Restore execute permission on scripts
        working-directory: source
        run: chmod +x platforms/android/scripts/*.sh

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install ninja-build

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.1.0" "ndk;${ANDROID_NDK_VERSION}"

      - name: Install Rust Android target
        run: |
          rustup toolchain install stable
          rustup target add ${{matrix.rust_target}}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure CMake
        working-directory: source
        run: cmake --preset ${{matrix.preset}}

      - name: Build native library
        working-directory: source
        run: cmake --build --preset ${{matrix.preset}} --target dusklight

      - name: Stage stripped JNI library
        working-directory: source
        run: ANDROID_STAGE_ABIS="${{matrix.abi}}" platforms/android/scripts/stage-jni-libs.sh

      - name: Build APK
        working-directory: source/platforms/android
        run: ./gradlew :app:assembleRelease --rerun-tasks

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dusklight-android-${{matrix.artifact_arch}}
          path: source/platforms/android/app/build/outputs/apk/release/app-${{matrix.abi}}-release-unsigned.apk
